<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!--
    PLACEHOLDER — Substituir por logo real da Scan Pro AG.
    Esta versão usa cores escuras (adequada para header e footer claros).
    Dimensões recomendadas: ~200×48px, fundo transparente.
  -->
  <rect width="200" height="48" fill="transparent"/>

  <!-- Ícone: círculo teal com símbolo de lüftung -->
  <circle cx="24" cy="24" r="18" fill="#198393"/>
  <path d="M16 24 Q20 16 24 20 Q28 24 32 18" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M16 28 Q20 24 28 28 Q32 26 35 30" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Texto — escuro para fundo claro -->
  <text x="52" y="21" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700" font-size="16" fill="#0f1923" letter-spacing="2">SCAN PRO</text>
  <text x="52" y="36" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="400" font-size="10" fill="#A1A1A1" letter-spacing="1.5">LÜFTUNGSSYSTEME AG</text>
</svg>
